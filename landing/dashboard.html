<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления — MyShop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: #0f172a; color: #fff; padding: 20px 0; z-index: 10; }
        .sidebar .logo { padding: 0 20px 20px; font-size: 20px; font-weight: 800; color: #3b82f6; border-bottom: 1px solid #1e293b; }
        .sidebar a { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: #94a3b8; text-decoration: none; font-size: 14px; transition: all 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #1e293b; color: #fff; }
        .main { margin-left: 240px; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; }
        .header .plan-badge { background: #3b82f6; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; }
        .stat-card .label { font-size: 13px; color: #64748b; margin-bottom: 5px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .value.green { color: #22c55e; }
        .stat-card .value.blue { color: #3b82f6; }
        .card { background: #fff; border-radius: 12px; padding: 24px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .card h3 { font-size: 16px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        th { color: #64748b; font-weight: 500; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-green { background: #dcfce7; color: #16a34a; }
        .badge-yellow { background: #fef3c7; color: #d97706; }
        .badge-blue { background: #dbeafe; color: #2563eb; }
        .badge-red { background: #fee2e2; color: #dc2626; }
        .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .action-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; text-align: center; text-decoration: none; color: #1e293b; transition: all 0.2s; }
        .action-card:hover { border-color: #3b82f6; box-shadow: 0 4px 12px rgba(59,130,246,0.1); }
        .action-card .icon { font-size: 28px; margin-bottom: 8px; }
        .action-card .title { font-size: 14px; font-weight: 600; }
        .empty { text-align: center; padding: 40px; color: #94a3b8; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">MyShop</div>
        <a href="#" class="active">📊 Дашборд</a>
        <a href="/admin.html">📦 Товары</a>
        <a href="/admin.html#orders">🛒 Заказы</a>
        <a href="/admin.html#customers">👥 Клиенты</a>
        <a href="/admin.html#analytics">📈 Аналитика</a>
        <a href="/admin.html#settings">⚙️ Настройки</a>
    </div>

    <div class="main">
        <div class="header">
            <h1 id="storeTitle">Мой магазин</h1>
            <span class="plan-badge" id="planBadge">Starter</span>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="label">Заказы сегодня</div>
                <div class="value blue" id="ordersToday">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Выручка</div>
                <div class="value green" id="revenue">0 ₽</div>
            </div>
            <div class="stat-card">
                <div class="label">Товары</div>
                <div class="value" id="productsCount">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Клиенты</div>
                <div class="value" id="customersCount">0</div>
            </div>
        </div>

        <div class="actions">
            <a href="/admin.html#products/add" class="action-card">
                <div class="icon">➕</div>
                <div class="title">Добавить товар</div>
            </a>
            <a href="/admin.html#orders" class="action-card">
                <div class="icon">📋</div>
                <div class="title">Заказы</div>
            </a>
            <a href="/?preview=1" target="_blank" class="action-card">
                <div class="icon">👁️</div>
                <div class="title">Посмотреть магазин</div>
            </a>
        </div>

        <div class="card">
            <h3>Последние заказы</h3>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Клиент</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                        <th>Дата</th>
                    </tr>
                </thead>
                <tbody id="ordersTable">
                    <tr><td colspan="5" class="empty">Пока нет заказов</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h3>Подписка</h3>
            <div id="subscriptionInfo">
                <p style="color:#64748b;font-size:14px;">Загрузка...</p>
            </div>
        </div>
    </div>

    <script>
    const API = window.location.hostname === 'localhost'
        ? 'http://localhost:8000'
        : 'https://' + window.location.hostname;

    const token = localStorage.getItem('accessToken');

    if (!token) {
        window.location.href = '/landing/';
    }

    const headers = {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token,
    };

    async function loadDashboard() {
        try {
            // Load store settings
            const settingsRes = await fetch(API + '/api/store/settings', { headers });
            if (settingsRes.ok) {
                const settings = await settingsRes.json();
                document.getElementById('storeTitle').textContent = settings.store_name || 'Мой магазин';
            }

            // Load stats from admin
            const statsRes = await fetch(API + '/api/admin/stats', { headers });
            if (statsRes.ok) {
                const stats = await statsRes.json();
                document.getElementById('ordersToday').textContent = stats.orders_today || 0;
                document.getElementById('revenue').textContent = (stats.revenue || 0).toLocaleString('ru-RU') + ' ₽';
                document.getElementById('productsCount').textContent = stats.products || 0;
                document.getElementById('customersCount').textContent = stats.users || 0;
            }

            // Load orders
            const ordersRes = await fetch(API + '/api/admin/orders', { headers });
            if (ordersRes.ok) {
                const orders = await ordersRes.json();
                renderOrders(Array.isArray(orders) ? orders : []);
            }

            // Load billing
            const billingRes = await fetch(API + '/api/billing/subscription', { headers });
            if (billingRes.ok) {
                const sub = await billingRes.json();
                renderSubscription(sub);
            }
        } catch (err) {
            console.error('Dashboard error:', err);
        }
    }

    function renderOrders(orders) {
        const tbody = document.getElementById('ordersTable');
        if (!orders.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">Пока нет заказов</td></tr>';
            return;
        }
        tbody.innerHTML = orders.slice(0, 5).map(o => {
            const statusClass = o.status === 'paid' ? 'green' : o.status === 'cancelled' ? 'red' : 'yellow';
            return `<tr>
                <td>#${o.id}</td>
                <td>${o.user_id || '—'}</td>
                <td>${(o.total || 0).toLocaleString('ru-RU')} ₽</td>
                <td><span class="badge badge-${statusClass}">${o.status}</span></td>
                <td>${o.created_at ? new Date(o.created_at).toLocaleDateString('ru-RU') : '—'}</td>
            </tr>`;
        }).join('');
    }

    function renderSubscription(sub) {
        const el = document.getElementById('subscriptionInfo');
        if (!sub || sub.detail) {
            el.innerHTML = '<p style="color:#64748b;font-size:14px;">Нет активной подписки</p>';
            return;
        }
        const badge = sub.status === 'active' ? 'green' : 'red';
        document.getElementById('planBadge').textContent = sub.plan || 'Starter';
        el.innerHTML = `
            <div style="display:flex;gap:20px;align-items:center;">
                <span class="badge badge-${badge}">${sub.status === 'active' ? 'Активна' : 'Неактивна'}</span>
                <span style="font-size:14px;">Тариф: <strong>${sub.plan}</strong></span>
                <span style="font-size:14px;">Действует до: <strong>${sub.expires_at ? new Date(sub.expires_at).toLocaleDateString('ru-RU') : '—'}</strong></span>
            </div>
        `;
    }

    loadDashboard();
    </script>
</body>
</html>
